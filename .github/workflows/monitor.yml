name: FreeAPIRadar Monitor
on:
  schedule:
    - cron: '0 */6 * * *'    # every 6 hours
  workflow_dispatch:           # manual trigger

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install aiohttp python-telegram-bot

      - name: Run monitor
        run: python core/monitor.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}

      - name: Generate README
        run: python core/readme_gen.py

      - name: Send Telegram alerts
        if: always()
        run: python -m bot.notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          STATUS_PATH: data/status.json
          CHANGES_PATH: data/changes.json
          SUBSCRIBERS_PATH: data/subscribers.json

      - name: Commit results
        run: |
          git config user.name "FreeAPIRadar Bot"
          git config user.email "bot@freeapiradar.dev"
          git add data/ README.md
          git commit -m "📡 Status update: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push
